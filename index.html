<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totally Normal Calculator™</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="header">
                <h1>Totally Normal Calculator™</h1>
                <div class="trust-meter">
                    <span>Trust Level:</span>
                    <div class="trust-bar">
                        <div class="trust-fill" id="trustFill"></div>
                    </div>
                    <span id="trustPercent">100%</span>
                </div>
            </div>
            
            <div class="display-container">
                <div class="display" id="display">0</div>
                <div class="loading-bar" id="loadingBar"></div>
            </div>
            
            <div class="mode-toggle">
                <label class="toggle-switch">
                    <input type="checkbox" id="aiMode">
                    <span class="slider"></span>
                </label>
                <span>AI Mode (More Accurate™)</span>
            </div>
            
            <div class="buttons" id="buttonGrid">
                <button class="btn operator" data-value="C">C</button>
                <button class="btn operator" data-value="/">/</button>
                <button class="btn operator" data-value="*">×</button>
                <button class="btn operator" data-value="backspace">←</button>
                
                <button class="btn" data-value="7">7</button>
                <button class="btn" data-value="8">8</button>
                <button class="btn" data-value="9">9</button>
                <button class="btn operator" data-value="-">−</button>
                
                <button class="btn" data-value="4">4</button>
                <button class="btn" data-value="5">5</button>
                <button class="btn" data-value="6">6</button>
                <button class="btn operator" data-value="+">+</button>
                
                <button class="btn" data-value="1">1</button>
                <button class="btn" data-value="2">2</button>
                <button class="btn" data-value="3">3</button>
                <button class="btn equals" data-value="=" rowspan="2">=</button>
                
                <button class="btn zero" data-value="0">0</button>
                <button class="btn" data-value=".">.</button>
            </div>
        </div>
        
        <div class="toast" id="toast"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
